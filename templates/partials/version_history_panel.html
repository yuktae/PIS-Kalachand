<!-- Version History & Change Log Slide-Out Panel -->
<!-- Include this partial in any edit/verify page that has product.id in context -->
<!-- Requires: product.id to be available in template context -->

<div x-data="versionPanel()" x-cloak>

    <!-- Floating Toggle Button -->
    <!-- z-[70] keeps the button above any page-chrome sticky preview pane
         (some Edit pages use z-[60] to lift the preview over the page header). -->
    <button type="button" @click="open = true; loadData()"
        class="fixed bottom-6 right-6 z-[70] w-14 h-14 bg-slate-900 text-white rounded-2xl shadow-2xl shadow-slate-400/30 hover:bg-slate-800 hover:scale-105 transition-all flex items-center justify-center group">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="absolute right-16 bg-slate-900 text-white text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap shadow-lg">
            Version History
        </span>
    </button>

    <!-- Backdrop -->
    <!-- z-[100] sits above any sticky page chrome (preview pane z-[60], page
         header z-50, sticky action bar z-[55]) so the slide-out always covers
         the page uniformly across marketing / director / web edit screens. -->
    <div x-show="open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        @click="open = false" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-[100]"></div>

    <!-- Slide-Out Panel -->
    <div x-show="open" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
        x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0"
        x-transition:leave-end="translate-x-full"
        class="fixed right-0 top-0 h-full w-full max-w-lg bg-white shadow-2xl z-[100] flex flex-col overflow-hidden">

        <!-- Panel Header -->
        <div class="px-6 py-5 border-b border-gray-100 bg-white flex-shrink-0">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-slate-900 text-white rounded-xl flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-900">History & Revisions</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Version control & audit trail</p>
                    </div>
                </div>
                <button type="button" @click="open = false" class="w-8 h-8 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Panel Content (scrollable) -->
        <div class="flex-1 overflow-y-auto">

            <!-- Loading -->
            <template x-if="loading">
                <div class="flex flex-col items-center justify-center py-20 text-gray-400">
                    <div class="w-8 h-8 border-2 border-gray-200 border-t-slate-900 rounded-full animate-spin mb-3"></div>
                    <p class="text-xs font-bold">Loading...</p>
                </div>
            </template>

            <!-- VERSIONS TIMELINE -->
            <div x-show="!loading" class="p-6">

                <!-- Empty State -->
                <template x-if="versions.length === 0">
                    <div class="text-center py-16">
                        <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3 text-gray-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        </div>
                        <p class="text-sm font-bold text-slate-700">No versions yet</p>
                        <p class="text-xs text-gray-400 mt-1">Versions are saved automatically when you save, submit, or approve.</p>
                    </div>
                </template>

                <!-- Timeline -->
                <div class="relative">
                    <!-- Timeline line -->
                    <div class="absolute left-4 top-0 bottom-0 w-px bg-gray-200" x-show="versions.length > 0"></div>

                    <template x-for="(v, i) in versions" :key="v.id">
                        <div class="relative pl-10 pb-6 last:pb-0">
                            <!-- Timeline dot -->
                            <div class="absolute left-2.5 top-1 w-3 h-3 rounded-full border-2 border-white shadow-sm"
                                :class="i === 0 ? 'bg-indigo-500' : 'bg-gray-300'"></div>

                            <div class="bg-white border border-gray-100 rounded-xl p-4 hover:border-gray-200 hover:shadow-sm transition-all group">
                                <div class="flex items-start justify-between gap-3">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-xs font-bold text-slate-800" x-text="'v' + v.version_num"></span>
                                            <span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider"
                                                :class="v.workflow_stage === 'finalized' ? 'bg-emerald-50 text-emerald-700' : 
                                                         v.workflow_stage === 'ready_for_web' ? 'bg-indigo-50 text-indigo-700' : 
                                                         'bg-gray-50 text-gray-600'"
                                                x-text="v.workflow_stage?.replace(/_/g, ' ') || 'draft'"></span>
                                        </div>
                                        <p class="text-sm font-medium text-slate-700 truncate" x-text="v.label"></p>
                                        <div class="flex items-center gap-3 mt-2 text-[10px] text-gray-400">
                                            <span class="flex items-center gap-1">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                                <span x-text="v.created_by"></span>
                                            </span>
                                            <span class="flex items-center gap-1">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                <span x-text="v.created_at"></span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <!-- Action buttons -->
                                <div class="flex items-center gap-2 mt-3 pt-3 border-t border-gray-50">
                                    <button type="button" @click="openChangesModal(v.version_num, v.label)"
                                        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 bg-gray-50 text-slate-700 rounded-lg text-[10px] font-bold hover:bg-gray-100 transition-colors">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                                        <span x-text="'View Changes (' + getVersionChangesCount(v.version_num) + ')'"></span>
                                    </button>
                                    <button type="button" @click="restoreVersion(v.id, v.version_num)" 
                                        x-show="i > 0"
                                        class="flex items-center justify-center gap-1 px-3 py-2 bg-indigo-50 text-indigo-700 rounded-lg text-[10px] font-bold hover:bg-indigo-100 transition-colors">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                        Restore
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- VERSION CHANGES MODAL -->
    <!-- z-[110] keeps this nested modal above the slide-out panel (z-[100]). -->
    <div x-show="showChangesModal" x-transition class="fixed inset-0 z-[110] flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-3xl mx-4 shadow-2xl flex flex-col max-h-[85vh] overflow-hidden" @click.away="showChangesModal = false">
            <!-- Modal header -->
            <div class="px-6 py-4 border-b border-gray-100 flex-shrink-0 bg-gradient-to-r from-slate-50 to-white">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-sm">
                            <svg class="w-4.5 h-4.5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h4 class="text-base font-extrabold text-gray-900" x-text="'Version ' + changesModalVersion"></h4>
                                <span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 rounded-md text-[10px] font-bold"
                                    x-text="changesModalChanges.length + ' change' + (changesModalChanges.length !== 1 ? 's' : '')"></span>
                            </div>
                            <p class="text-[11px] text-gray-400 mt-0.5" x-text="changesModalLabel"></p>
                        </div>
                    </div>
                    <button type="button" @click="showChangesModal = false" class="text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 p-1.5 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Column headers -->
            <template x-if="changesModalChanges.length > 0">
                <div class="px-6 py-2.5 bg-gray-50 border-b border-gray-100 flex-shrink-0">
                    <div class="grid grid-cols-[180px_1fr_1fr] gap-3 items-center">
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Field</div>
                        <div class="text-[10px] font-bold text-red-400 uppercase tracking-wider flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4"/></svg>
                            Before
                        </div>
                        <div class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                            After
                        </div>
                    </div>
                </div>
            </template>

            <!-- Modal body (scrollable) -->
            <div class="flex-1 overflow-y-auto">
                <!-- Empty state -->
                <template x-if="changesModalChanges.length === 0">
                    <div class="text-center py-16">
                        <div class="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-3 text-gray-300">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <p class="text-sm font-bold text-slate-600">No field changes</p>
                        <p class="text-[11px] text-gray-400 mt-1">This version was created without modifying any fields.</p>
                    </div>
                </template>

                <!-- Changes rows -->
                <div class="divide-y divide-gray-100">
                    <template x-for="(c, ci) in changesModalChanges" :key="c.id || ci">
                        <div class="px-6 py-4 hover:bg-gray-50/80 transition-colors">
                            <div class="grid grid-cols-[180px_1fr_1fr] gap-3 items-start">

                                <!-- Field name + section -->
                                <div class="pt-0.5">
                                    <span class="text-[12px] font-bold text-gray-800 leading-tight block" x-text="c.field_name"></span>
                                    <span class="text-[10px] font-medium mt-0.5 block px-1.5 py-0.5 rounded w-fit"
                                        :class="{
                                            'bg-red-50 text-red-600': c.section === 'Header',
                                            'bg-indigo-50 text-indigo-600': c.section === 'Description',
                                            'bg-amber-50 text-amber-600': c.section === 'Sales' || c.section === 'Key Features',
                                            'bg-purple-50 text-purple-600': c.section === 'Specs',
                                            'bg-green-50 text-green-600': c.section === 'SEO',
                                            'bg-blue-50 text-blue-600': c.section === 'Warranty',
                                            'bg-pink-50 text-pink-600': c.section === 'Classification',
                                            'bg-gray-100 text-gray-500': !['Header','Description','Sales','Key Features','Specs','SEO','Warranty','Classification'].includes(c.section)
                                        }"
                                        x-text="c.section"></span>
                                </div>

                                <!-- Old (before) value -->
                                <div class="min-w-0">
                                    <div class="bg-red-50 border border-red-100 rounded-lg px-3 py-2.5 text-[12px] text-red-700 break-words max-h-32 overflow-y-auto leading-relaxed"
                                         :class="c.old_value ? '' : 'italic text-red-300'">
                                        <span x-html="vDiffOld(c.old_value, c.new_value)"></span>
                                    </div>
                                </div>

                                <!-- New (after) value -->
                                <div class="min-w-0">
                                    <div class="bg-emerald-50 border border-emerald-100 rounded-lg px-3 py-2.5 text-[12px] text-emerald-800 break-words max-h-32 overflow-y-auto leading-relaxed"
                                         :class="c.new_value ? '' : 'italic text-emerald-300'">
                                        <span x-html="vDiffNew(c.old_value, c.new_value)"></span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Restore Confirmation Modal -->
    <div x-show="showRestoreModal" x-transition class="fixed inset-0 z-[110] flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl text-center">
            <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-slate-900 mb-2">Restore Version?</h3>
            <p class="text-sm text-gray-500 mb-6">
                This will revert the product data to <strong x-text="'version ' + restoreVersionNum"></strong>. 
                Your current state will be saved as a new version before restoring.
            </p>
            <div class="flex gap-3">
                <button type="button" @click="showRestoreModal = false" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors text-sm">Cancel</button>
                <button type="button" @click="confirmRestore()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors text-sm shadow-lg shadow-indigo-200">
                    Restore
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .diff-del {
        background: rgba(239, 68, 68, 0.15);
        text-decoration: line-through;
        text-decoration-color: rgba(239, 68, 68, 0.5);
        border-radius: 2px;
        padding: 0 2px;
    }
    .diff-add {
        background: rgba(16, 185, 129, 0.18);
        text-decoration: underline;
        text-decoration-color: rgba(16, 185, 129, 0.6);
        text-decoration-thickness: 2px;
        text-underline-offset: 2px;
        border-radius: 2px;
        padding: 0 2px;
        font-weight: 600;
    }
</style>

<script>
function versionPanel() {
    const productId = {{ product.id }};

    /* ===== Word-level diff helpers ===== */
    function _tokenize(str) {
        if (!str) return [];
        return str.match(/\S+|\s+/g) || [];
    }
    function _esc(s) {
        const el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }
    function _lcs(a, b) {
        const m = a.length, n = b.length;
        const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
        for (let i = 1; i <= m; i++)
            for (let j = 1; j <= n; j++)
                dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
        const matchA = new Set(), matchB = new Set();
        let i = m, j = n;
        while (i > 0 && j > 0) {
            if (a[i-1] === b[j-1]) { matchA.add(i-1); matchB.add(j-1); i--; j--; }
            else if (dp[i-1][j] > dp[i][j-1]) i--;
            else j--;
        }
        return { matchA, matchB };
    }

    return {
        open: false,
        loading: false,
        versions: [],
        changelog: [],
        
        // Restore modal
        showRestoreModal: false,
        restoreVersionId: null,
        restoreVersionNum: null,

        // Changes modal
        showChangesModal: false,
        changesModalVersion: null,
        changesModalLabel: '',
        changesModalChanges: [],

        getVersionChangesCount(versionNum) {
            return this.changelog.filter(c => c.version_num === versionNum).length;
        },

        openChangesModal(versionNum, label) {
            this.changesModalVersion = versionNum;
            this.changesModalLabel = label;
            this.changesModalChanges = this.changelog.filter(c => c.version_num === versionNum);
            this.showChangesModal = true;
        },

        /* Word-diff methods (called from x-html) */
        vDiffOld(oldVal, newVal) {
            if (!oldVal) return '<span class="italic opacity-50">(empty)</span>';
            if (!newVal) return _esc(oldVal);
            const a = _tokenize(oldVal), b = _tokenize(newVal);
            const { matchA } = _lcs(a, b);
            return a.map((tok, idx) => {
                if (/^\s+$/.test(tok)) return tok;
                return matchA.has(idx) ? _esc(tok) : '<span class="diff-del">' + _esc(tok) + '</span>';
            }).join('');
        },
        vDiffNew(oldVal, newVal) {
            if (!newVal) return '<span class="italic opacity-50">(empty)</span>';
            if (!oldVal) return _esc(newVal);
            const a = _tokenize(oldVal), b = _tokenize(newVal);
            const { matchB } = _lcs(a, b);
            return b.map((tok, idx) => {
                if (/^\s+$/.test(tok)) return tok;
                return matchB.has(idx) ? _esc(tok) : '<span class="diff-add">' + _esc(tok) + '</span>';
            }).join('');
        },
        
        async loadData() {
            if (this.versions.length > 0) return;
            this.loading = true;
            try {
                const [vRes, cRes] = await Promise.all([
                    fetch('/api/product/' + productId + '/versions'),
                    fetch('/api/product/' + productId + '/changelog')
                ]);
                this.versions = await vRes.json();
                this.changelog = await cRes.json();
            } catch (e) {
                console.error('Failed to load history:', e);
            }
            this.loading = false;
        },
        
        restoreVersion(versionId, versionNum) {
            this.restoreVersionId = versionId;
            this.restoreVersionNum = versionNum;
            this.showRestoreModal = true;
        },
        
        async confirmRestore() {
            try {
                const res = await fetch('/api/product/' + productId + '/versions/' + this.restoreVersionId + '/restore', {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.ok) {
                    this.showRestoreModal = false;
                    window.location.reload();
                } else {
                    alert(data.error || 'Failed to restore');
                }
            } catch (e) {
                alert('Network error. Please try again.');
            }
        }
    };
}
</script>
