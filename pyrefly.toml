# Pyrefly type-checker configuration.
#
# Without this, Pyrefly auto-discovers a Python interpreter and on this
# machine picks up the Microsoft Store Python 3.11 in
# C:\Program Files\WindowsApps\PythonSoftwareFoundation.Python.3.11_…
# That interpreter doesn't have flask / werkzeug / sqlalchemy installed,
# so every import in blueprints/* lights up red in the Problems panel
# even though the code runs fine when launched via the project venv.
#
# Pointing `python-interpreter` at the venv tells Pyrefly to query its
# site-packages directly, so the imports resolve.

python-interpreter = "venv/Scripts/python.exe"
python-version = "3.12"

# Project layout — anchor everything at the repo root so absolute imports
# like `from blueprints.marketing import …` and `from utils import …`
# resolve against this directory's modules first.
project-includes = ["**/*.py"]
project-excludes = ["venv/**", "**/__pycache__/**", ".git/**"]

# Extra import roots so the AI-eval suite's internal imports type-check.
# After the 2026-05-18 folder refactor:
#   - tests/ai_tests/  holds conftest.py at the root (test modules and
#     tools both do `from conftest import …` against it)
#   - tests/ai_tests/lib/  holds judge.py + judge_cache.py (imported via
#     bare `import judge` / `import judge_cache` from the test modules)
# Pyrefly's default heuristics anchor only on the repo root, so without
# these entries it can't resolve those bare imports and lights up the
# Problems panel even though the imports work at runtime via the sys.path
# manipulation in tests/ai_tests/conftest.py.
search-path = ["tests/ai_tests", "tests/ai_tests/lib"]
